services:
  postgres:
    image: postgres:16
    container_name: usdc-ops-postgres
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_DB: usdc_ops
      POSTGRES_USER: usdc_ops
      POSTGRES_PASSWORD: usdc_ops
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usdc_ops -d usdc_ops"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres_data:
