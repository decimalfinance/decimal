<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Decimal — Payments embed</title>
<link rel="stylesheet" href="../decimal/tokens.css" />
<link rel="stylesheet" href="../decimal/components.css" />
<link rel="stylesheet" href="../decimal/pages.css" />
<style>
  html, body { margin: 0; background: #fff; overflow: hidden; }
  /* product canvas solid white; only the outer browser strip is translucent */
  .dec .app { background: #fff; }
  /* render the app at a fixed design size, scaled to fit the iframe width */
  #scaler { width: 1280px; height: 860px; transform-origin: top left; }
  #scaler .dec, #scaler .app { height: 860px; }

  /* EXPERIMENT: grey sidebar (scoped to embed; delete block to revert) */
  .dec .sidebar { background: #F3F1ED; border-right-color: rgba(11,11,11,.09); }
  .dec .sb-org { border-color: rgba(11,11,11,.10); }
  .dec .sb-org:hover { background: rgba(11,11,11,.04); }
  .dec .sb-item:hover { background: rgba(11,11,11,.05); }
  .dec .sb-item.is-active { background: rgba(11,11,11,.08); color: var(--text-primary); }
  .dec .sb-footer { border-top-color: rgba(11,11,11,.08); }
  .dec .sb-user:hover { background: rgba(11,11,11,.04); }
</style>
</head>
<body>
<div id="scaler"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../decimal/icons.jsx"></script>
<script type="text/babel" src="../decimal/pages-shell.jsx"></script>
<script type="text/babel" src="../decimal/pages-payments.jsx"></script>
<script type="text/babel">
  const W = 1280, H = 860;
  const scaler = document.getElementById("scaler");
  ReactDOM.createRoot(scaler).render(<PagePayments />);
  function fit() {
    const s = window.innerWidth / W;
    scaler.style.transform = "scale(" + s + ")";
    document.body.style.height = (H * s) + "px";
  }
  fit();
  window.addEventListener("resize", fit);
  setTimeout(fit, 200);
</script>
</body>
</html>
